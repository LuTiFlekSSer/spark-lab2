services:
  nn1:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: nn1
    ports:
      - "9871:9870"
      - "9001:9000"
    volumes:
      - nn1_name:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=cluster1
    env_file:
      - ../env/hadoop-1-node.env
    networks:
      - cluster1

  dn1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: dn1
    volumes:
      - dn1_data:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "nn1:9870"
    env_file:
      - ../env/hadoop-1-node.env
    depends_on:
      - nn1
    networks:
      - cluster1

  rm1:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: rm1
    ports:
      - "8088:8088"
    environment:
      SERVICE_PRECONDITION: "nn1:9870 dn1:9864"
    env_file:
      - ../env/hadoop-1-node.env
    depends_on:
      - dn1
    networks:
      - cluster1

  nm1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nm1
    environment:
      SERVICE_PRECONDITION: "nn1:9870 dn1:9864 rm1:8088"
    env_file:
      - ../env/hadoop-1-node.env
    depends_on:
      - rm1
    networks:
      - cluster1

  hs1:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: hs1
    ports:
      - "8181:8188"
    volumes:
      - hs1_data:/hadoop/yarn/timeline
    environment:
      SERVICE_PRECONDITION: "nn1:9870 dn1:9864 rm1:8088"
    env_file:
      - ../env/hadoop-1-node.env
    depends_on:
      - rm1
    networks:
      - cluster1

volumes:
  nn1_name:
  dn1_data:
  hs1_data:

networks:
  cluster1:
    name: cluster1
    driver: bridge